{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-120px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="glass-panel w-full max-w-lg p-8 sm:p-10 animate-fade-in-down">
        
        <div class="text-center mb-8">
            <div class="mx-auto h-16 w-16 bg-primary-50 rounded-full flex items-center justify-center mb-4 border border-primary-100 shadow-sm">
                <i class="fas fa-user-plus text-3xl text-primary-600"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Crear Cuenta</h2>
            <p class="mt-2 text-sm text-slate-500">Completa tus datos para solicitar el acceso QR</p>
        </div>
        
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Completo</label>
                    <input type="text" name="nombre" class="input-field" placeholder="Ej: Juan Pérez" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">RUT / Documento ID</label>
                    <input type="text" name="rut" class="input-field font-mono text-sm" placeholder="12345678-9" required>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                    <input type="email" name="correo" class="input-field" placeholder="juan@ejemplo.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Empresa / Departamento</label>
                    <input type="text" name="empresa" class="input-field" placeholder="Empresa S.A." required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                    <input type="password" name="password" class="input-field" placeholder="••••••••" required minlength="6">
                    <p class="mt-1 text-xs text-slate-500">Mínimo 6 caracteres</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar Contraseña</label>
                    <input type="password" name="password2" class="input-field" placeholder="••••••••" required minlength="6">
                </div>
            </div>
            
            <div class="pt-4">
                <button type="submit" class="btn-primary w-full flex justify-center py-2.5 items-center gap-2 text-base">
                    <i class="fas fa-user-check"></i> Enviar Solicitud de Registro
                </button>
            </div>
        </form>
        
        <div class="mt-6 pt-6 border-t border-slate-200">
            <div class="text-center space-y-4">
                <p class="text-sm text-slate-500">¿Ya tienes una cuenta aprobada?</p>
                <a href="{{ url_for('auth.login') }}" class="text-primary-600 hover:text-primary-700 font-medium text-sm transition-colors inline-flex items-center gap-1">
                    <i class="fas fa-sign-in-alt text-xs"></i> Volver a Iniciar Sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
